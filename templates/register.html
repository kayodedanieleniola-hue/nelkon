<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — NAKCONEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse 60% 50% at 50% 40%, #3D0A0A 0%, transparent 70%),
                        radial-gradient(ellipse 130% 110% at 50% 50%, #1B0404 0%, #0A0202 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .container {
            background: rgba(61,10,10,0.7); backdrop-filter: blur(16px);
            padding: 40px; border-radius: 16px;
            border: 1px solid rgba(201,154,74,0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            width: 100%; max-width: 450px;
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
        .header { text-align: center; margin-bottom: 30px; }
        .logo { height: 64px; width: auto; margin: 0 auto 16px; display: block; }
        h1 { color: #FDFAF4; font-size: 26px; font-weight: 700; margin-bottom: 6px; }
        .subtitle { color: rgba(245,232,199,0.5); font-size: 13px; }
        .form-group { margin-bottom: 20px; }
        label { display: flex; align-items: center; margin-bottom: 8px; color: rgba(245,232,199,0.7); font-weight: 600; font-size: 13px; }
        label i { margin-right: 8px; color: #C99A4A; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%; padding: 12px 14px;
            border: 1px solid rgba(201,154,74,0.2); border-radius: 8px;
            font-size: 14px; transition: all 0.3s ease;
            background: rgba(10,2,2,0.6); color: #FDFAF4;
        }
        input:focus { outline: none; border-color: #C99A4A; background: rgba(61,10,10,0.4); box-shadow: 0 0 0 3px rgba(201,154,74,0.1); }
        input.error { border-color: #f44336 !important; }
        .error-message { color: #f44336; font-size: 12px; margin-top: 5px; display: none; }
        .error-message.show { display: block; }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 42px; }
        .toggle-password {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; color: rgba(245,232,199,0.4);
            font-size: 15px; padding: 0; width: auto; margin: 0;
        }
        .toggle-password:hover { color: #C99A4A; transform: translateY(-50%); }
        .strength-meter { height: 4px; border-radius: 3px; background: rgba(255,255,255,0.1); margin-top: 8px; overflow: hidden; }
        .strength-meter-fill { height: 100%; width: 0%; border-radius: 3px; transition: width 0.3s ease, background 0.3s ease; }
        .strength-label { font-size: 11px; margin-top: 4px; color: rgba(245,232,199,0.4); }
        .checkbox-group { display: flex; align-items: center; margin-bottom: 20px; padding: 12px; background: rgba(10,2,2,0.3); border-radius: 8px; border: 1px solid rgba(201,154,74,0.1); }
        input[type="checkbox"] { margin-right: 10px; width: 16px; height: 16px; cursor: pointer; accent-color: #C99A4A; }
        .checkbox-group label { margin-bottom: 0; font-weight: 400; font-size: 13px; color: rgba(245,232,199,0.6); }
        .btn {
            width: 100%; padding: 13px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.3s ease;
            margin-bottom: 12px; letter-spacing: 0.5px;
        }
        .btn-primary { background: linear-gradient(135deg, #C99A4A, #8B6A2E); color: #1B0404; box-shadow: 0 4px 15px rgba(201,154,74,0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,154,74,0.4); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .btn-google { background: rgba(10,2,2,0.5); border: 1px solid rgba(201,154,74,0.2); color: #FDFAF4; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google:hover { border-color: #C99A4A; background: rgba(61,10,10,0.5); }
        .divider { text-align: center; margin: 20px 0; color: rgba(245,232,199,0.2); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .alert { padding: 12px 15px; border-radius: 8px; margin-bottom: 20px; display: none; font-size: 13px; }
        .alert.show { display: block; }
        .alert.error { background: rgba(244,67,54,0.15); color: #f44336; border-left: 3px solid #f44336; }
        .alert.success { background: rgba(76,175,80,0.15); color: #4caf50; border-left: 3px solid #4caf50; }
        .bottom-link { text-align: center; margin-top: 20px; color: rgba(245,232,199,0.5); font-size: 13px; }
        .bottom-link a { color: #C99A4A; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/static/image/logo.png" alt="NAKCONEL" class="logo">
            <h1>Create Account</h1>
            <p class="subtitle">Sign up to get started</p>
        </div>

        <div class="alert" id="alertMessage"></div>

        <button type="button" class="btn btn-google" id="googleBtn">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.6 26.8 36 24 36c-5.2 0-9.6-2.9-11.3-7.1l-6.5 5C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.5 35.5 44 30.2 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
            Continue with Google
        </button>

        <div class="divider">or sign up with email</div>

        <form id="registrationForm">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
                <div class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="username"><i class="fas fa-at"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
                <div class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter a password" required>
                    <button type="button" class="toggle-password" data-target="password"><i class="fas fa-eye"></i></button>
                </div>
                <div class="strength-meter"><div class="strength-meter-fill" id="strengthFill"></div></div>
                <div class="strength-label" id="strengthLabel">Use 8+ characters with letters and numbers</div>
                <div class="error-message"></div>
            </div>
            <div class="form-group">
                <label for="confirmPassword"><i class="fas fa-lock"></i> Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
                    <button type="button" class="toggle-password" data-target="confirmPassword"><i class="fas fa-eye"></i></button>
                </div>
                <div class="error-message"></div>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the Terms of Service</label>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">Create Account</button>
        </form>

        <p class="bottom-link">Already have an account? <a href="/login">Sign in here</a></p>
    </div>

    <script type="module">
        import { createUserWithEmailAndPassword, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        import { doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
        import { auth, db, googleProvider } from '/static/js/firebase-config.js';

        document.getElementById('googleBtn').addEventListener('click', async () => {
            try {
                const cred = await signInWithPopup(auth, googleProvider);
                await setDoc(doc(db, 'users', cred.user.uid), {
                    username: cred.user.displayName,
                    email: cred.user.email,
                    createdAt: new Date().toISOString()
                }, { merge: true });
                showAlert('Account ready! Redirecting…', 'success');
                setTimeout(() => window.location.href = '/', 1200);
            } catch (err) {
                const messages = {
                    'auth/operation-not-allowed': 'Google sign-up is not enabled. Please contact support.',
                    'auth/popup-blocked': 'Popup was blocked. Allow popups for this site.',
                    'auth/popup-closed-by-user': 'Sign-in popup was closed.',
                    'auth/network-request-failed': 'Network error. Check your connection.'
                };
                showAlert(messages[err.code] || `Google error (${err.code}): ${err.message}`, 'error');
            }
        });

        // Password show/hide toggles
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const target = document.getElementById(this.dataset.target);
                const icon = this.querySelector('i');
                const isHidden = target.type === 'password';
                target.type = isHidden ? 'text' : 'password';
                icon.classList.toggle('fa-eye', !isHidden);
                icon.classList.toggle('fa-eye-slash', isHidden);
            });
        });

        // Password strength meter
        const strengthFill = document.getElementById('strengthFill');
        const strengthLabel = document.getElementById('strengthLabel');
        const colors = ['#f44336','#ff9800','#ffc107','#8bc34a','#4caf50'];
        const labels = ['Very weak','Weak','Fair','Good','Strong'];
        function scorePassword(pw) {
            let s = 0;
            if (pw.length >= 8) s++;
            if (pw.length >= 12) s++;
            if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) s++;
            if (/[0-9]/.test(pw)) s++;
            if (/[^A-Za-z0-9]/.test(pw)) s++;
            return Math.min(s, 5);
        }
        document.getElementById('password').addEventListener('input', function() {
            const score = scorePassword(this.value);
            const pct = this.value.length === 0 ? 0 : Math.max(20, score * 20);
            strengthFill.style.width = pct + '%';
            if (!this.value.length) { strengthFill.style.background = ''; strengthLabel.textContent = 'Use 8+ characters with letters and numbers'; return; }
            strengthFill.style.background = colors[Math.max(0, score - 1)];
            strengthLabel.textContent = labels[Math.max(0, score - 1)];
        });

        // Form submission
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            document.querySelectorAll('.error-message').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('input').forEach(f => f.classList.remove('error'));

            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            let valid = true;

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFieldError('email', 'Enter a valid email address'); valid = false; }
            if (username.length < 3) { showFieldError('username', 'Username must be at least 3 characters'); valid = false; }
            if (password.length < 8 || !/[A-Za-z]/.test(password) || !/[0-9]/.test(password)) { showFieldError('password', 'Password must be 8+ characters with letters and numbers'); valid = false; }
            if (password !== confirmPassword) { showFieldError('confirmPassword', 'Passwords do not match'); valid = false; }
            if (!terms) { showAlert('You must agree to the Terms of Service.', 'error'); valid = false; }
            if (!valid) return;

            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.textContent = 'Creating account…';

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, 'users', cred.user.uid), {
                    username,
                    email,
                    createdAt: new Date().toISOString()
                });
                showAlert('Account created! You can now sign in.', 'success');
                this.reset();
                strengthFill.style.width = '0%';
                btn.textContent = 'Account Created ✓';
                setTimeout(() => window.location.href = '/login', 2000);
            } catch (err) {
                const messages = {
                    'auth/email-already-in-use': 'An account with this email already exists.',
                    'auth/invalid-email': 'Invalid email address.',
                    'auth/weak-password': 'Password is too weak.',
                    'auth/operation-not-allowed': 'Email/password sign-up is not enabled. Please contact support.',
                    'auth/network-request-failed': 'Network error. Check your connection.'
                };
                showAlert(messages[err.code] || `Error (${err.code}): ${err.message}`, 'error');
                btn.disabled = false; btn.textContent = 'Create Account';
            }
        });

        function showFieldError(id, msg) {
            const f = document.getElementById(id);
            f.classList.add('error');
            f.parentElement.querySelector('.error-message').textContent = msg;
            f.parentElement.querySelector('.error-message').classList.add('show');
        }
        function showAlert(msg, type) {
            const a = document.getElementById('alertMessage');
            a.textContent = msg; a.className = 'alert show ' + type;
        }
    </script>
</body>
</html>
